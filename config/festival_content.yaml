content:
  qingming:
    icon: "🪴"
    origin: "清明节起源于中国古代寒食传统，后与清明节气融合，成为兼具祭祖与踏青意义的重要节日。"
    story: "常见典故为介子推故事，后世逐渐发展出祭扫、踏青等习俗。"
    customs:
      - "扫墓祭祖"
      - "踏青郊游"
      - "插柳戴柳"
      - "放风筝"
    consumption:
      - "祭祀用品"
      - "青团与时令食品"
      - "周边短途出游"
      - "鲜花与代祭扫服务"
    holiday: "中国通常围绕清明节形成短假期安排，以当年官方通知为准。"

  easter:
    icon: "🐰"
    origin: "复活节是西方重要节日之一，常与春季、新生、家庭团聚相关。"
    story: "在西方文化语境中，复活节兼具宗教意义与大众消费节庆属性。"
    customs:
      - "彩蛋游戏"
      - "复活节兔子"
      - "家庭聚会"
      - "教堂礼拜"
    consumption:
      - "糖果与巧克力"
      - "儿童礼品"
      - "家庭聚餐"
      - "春季短途出行"
    holiday: "复活节不是美国统一联邦假日，但学校、教会和零售市场通常会有节庆活动。"

  memorial-day:
    icon: "🇺🇸"
    origin: "Memorial Day 是美国纪念阵亡军人的节日。"
    story: "该节点也被视为美国夏季消费季的开端。"
    customs:
      - "纪念活动"
      - "家庭烧烤"
      - "户外出游"
    consumption:
      - "家电折扣"
      - "户外用品"
      - "服装促销"
    holiday: "美国重要公共假日之一。"

  prime-day:
    icon: "🛒"
    origin: "Prime Day 是电商促销节点。"
    story: "通常会带动平台流量、品牌折扣和跨渠道价格战。"
    customs:
      - "平台限时折扣"
      - "品牌联动促销"
    consumption:
      - "3C数码"
      - "家居家电"
      - "个护与日用品"
    holiday: "非公共假日，为重要电商营销节点。"

  back-to-school:
    icon: "🎒"
    origin: "返校季是美国暑期结束前后的重要消费节点。"
    story: "家长和学生会集中采购学习、电子和服饰用品。"
    customs:
      - "返校采购"
      - "文具清单准备"
    consumption:
      - "耳机与电脑"
      - "文具与背包"
      - "服装鞋帽"
    holiday: "非公共假日，为重要季节性消费节点。"

  zhongqiu:
    icon: "🌕"
    origin: "中秋节是中国传统团圆节日。"
    story: "通常围绕赏月、团聚与礼赠展开。"
    customs:
      - "赏月"
      - "吃月饼"
      - "家庭团聚"
    consumption:
      - "月饼礼盒"
      - "礼赠商品"
      - "短途旅行"
    holiday: "中国传统节日，具体放假安排以官方通知为准。"

  guoqing:
    icon: "🇨🇳"
    origin: "国庆节是中国重要公共假期与消费节点。"
    story: "通常带来旅游、零售和礼赠需求提升。"
    customs:
      - "出游"
      - "聚会"
      - "线下活动"
    consumption:
      - "旅行相关"
      - "礼品零售"
      - "促销大盘增长"
    holiday: "中国重要长假节点。"
