<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ name }} - 节日专题</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #ffffff;
      --text: #111111;
      --muted: #6e6e73;
      --muted-2: #8e8e93;
      --line: rgba(17, 17, 17, 0.07);
      --line-soft: rgba(17, 17, 17, 0.045);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      --shadow-soft: 0 4px 18px rgba(15, 23, 42, 0.035);
      --radius-2xl: 28px;
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --black: #111111;
      --accent-bg: #f7f7f8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      color: var(--text);
      background:
        linear-gradient(to right, rgba(17,17,17,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(17,17,17,0.025) 1px, transparent 1px),
        linear-gradient(180deg, #fcfcfd 0%, #f5f5f7 100%);
      background-size: 40px 40px, 40px 40px, auto;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
      border-radius: var(--radius-2xl);
    }

    .card {
      background: var(--card-solid);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(17,17,17,0.06);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      padding: 26px;
      margin-bottom: 18px;
      min-height: 300px;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 248px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(17,17,17,0.06);
      font-size: 12px;
      color: var(--muted);
      width: fit-content;
      margin-bottom: 18px;
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f8;
      border: 1px solid var(--line-soft);
      font-size: 30px;
      flex-shrink: 0;
    }

    .hero-title {
      margin: 0;
      font-size: 42px;
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 760;
    }

    .hero-desc {
      font-size: 16px;
      line-height: 1.9;
      color: #374151;
      max-width: 650px;
      margin-top: 12px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line-soft);
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(17,17,17,0.06);
      border-radius: var(--radius-xl);
      padding: 18px;
    }

    .info-label {
      font-size: 12px;
      color: var(--muted-2);
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 720;
      letter-spacing: -0.04em;
    }

    .focus-card {
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at top right, rgba(17,17,17,0.03) 0%, transparent 36%),
        linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%);
      border: 1px solid var(--line-soft);
      min-height: 100%;
    }

    .focus-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .focus-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .focus-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 15px;
      line-height: 1.8;
      color: #1f2937;
    }

    .focus-index {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--black);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .section-card {
      padding: 22px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .section-text {
      font-size: 15px;
      line-height: 1.9;
      color: #374151;
    }

    .list-card {
      padding: 22px;
    }

    .list-title {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .clean-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .clean-item {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 12px;
      align-items: start;
      font-size: 15px;
      line-height: 1.85;
      color: #1f2937;
      padding: 10px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .clean-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #111111;
      margin-top: 10px;
    }

    .wide-card {
      padding: 22px;
      margin-bottom: 18px;
    }

    .holiday-note {
      font-size: 15px;
      line-height: 1.9;
      color: #374151;
    }

    .footer-note {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }

    @media (max-width: 1024px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .hero-title {
        font-size: 36px;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px 14px 40px;
      }

      .hero,
      .section-card,
      .list-card,
      .wide-card,
      .focus-card {
        padding: 18px;
      }

      .hero-title {
        font-size: 30px;
      }

      .hero-title-row {
        align-items: flex-start;
      }

      .hero-icon {
        width: 56px;
        height: 56px;
        font-size: 26px;
      }

      .info-value {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">
      <a class="back-link" href="index.html">
        <span>←</span>
        <span>返回日报首页</span>
      </a>
    </div>

    <div class="glass hero">
      <div class="hero-left">
        <div>
          <div class="eyebrow">
            <span>Festival Brief</span>
          </div>

          <div class="hero-title-row">
            <div class="hero-icon">{{ icon }}</div>
            <h1 class="hero-title">{{ name }}</h1>
          </div>

          <div class="hero-desc">
            {{ story or origin }}
          </div>

          <div class="hero-meta">
            {% if market %}
            <div class="meta-pill">
              <span>
                {% if market == "CN" %}
                  中国市场
                {% elif market == "US" %}
                  美国市场
                {% else %}
                  营销节点
                {% endif %}
              </span>
            </div>
            {% endif %}

            {% if type %}
            <div class="meta-pill">
              <span>
                {% if type == "traditional" %}
                  传统节日
                {% elif type == "holiday" %}
                  公共节日
                {% elif type == "campaign" %}
                  营销节点
                {% else %}
                  节点信息
                {% endif %}
              </span>
            </div>
            {% endif %}

            {% if date %}
            <div class="meta-pill">
              <span>{{ date }}</span>
            </div>
            {% endif %}
          </div>
        </div>
      </div>

      <div class="hero-right">
        <div class="info-card">
          <div class="info-label">Date</div>
          <div class="info-value">{{ date }}</div>
        </div>

        <div class="info-card">
          <div class="info-label">Countdown</div>
          <div class="info-value">{{ countdown }} 天</div>
        </div>

        <div class="focus-card">
          <div class="focus-title">Business Focus</div>
          <ul class="focus-list">
            {% if business_focus %}
              {% for item in business_focus %}
              <li class="focus-item">
                <div class="focus-index">{{ loop.index }}</div>
                <div>{{ item }}</div>
              </li>
              {% endfor %}
            {% else %}
              <li class="focus-item">
                <div class="focus-index">1</div>
                <div>关注该节点对应的消费节奏、平台活动与礼赠需求变化。</div>
              </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="card section-card">
        <h2 class="section-title">节日起源</h2>
        <div class="section-text">
          {{ origin }}
        </div>
      </div>

      <div class="card section-card">
        <h2 class="section-title">节日故事</h2>
        <div class="section-text">
          {{ story }}
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="card list-card">
        <h2 class="list-title">传统习俗 / 典型活动</h2>
        <ul class="clean-list">
          {% if customs %}
            {% for item in customs %}
            <li class="clean-item">
              <div class="dot"></div>
              <div>{{ item }}</div>
            </li>
            {% endfor %}
          {% else %}
            <li class="clean-item">
              <div class="dot"></div>
              <div>该节点通常会带动节庆活动、礼赠或主题消费。</div>
            </li>
          {% endif %}
        </ul>
      </div>

      <div class="card list-card">
        <h2 class="list-title">消费特征</h2>
        <ul class="clean-list">
          {% if consumption %}
            {% for item in consumption %}
            <li class="clean-item">
              <div class="dot"></div>
              <div>{{ item }}</div>
            </li>
            {% endfor %}
          {% else %}
            <li class="clean-item">
              <div class="dot"></div>
              <div>该节点通常伴随礼赠、平台活动或零售流量波动。</div>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>

    <div class="card wide-card">
      <h2 class="section-title">放假 / 节奏说明</h2>
      <div class="holiday-note">
        {{ holiday }}
      </div>
    </div>

    <div class="footer-note">
      Festival Detail Page · Daily Intelligence Brief
    </div>

  </div>
</body>
</html>
